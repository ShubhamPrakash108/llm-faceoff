<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Faceoff - Personal Assistant</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --chat-bg: #1e293b;
            --user-msg: #3b82f6;
            --ai-msg: #334155;
            --text-color: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #020617;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        select {
            padding: 0.5rem;
            border-radius: 4px;
            background-color: #1e293b;
            color: white;
            border: 1px solid #475569;
            outline: none;
        }

        #chat-container {
            flex-grow: 1;
            padding: 2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .message {
            max-width: 70%;
            padding: 1rem;
            border-radius: 8px;
            line-height: 1.5;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .user-message {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 0;
        }

        .ai-message {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border-bottom-left-radius: 0;
        }

        #input-container {
            padding: 1.5rem;
            background-color: #020617;
            border-top: 1px solid #334155;
            display: flex;
            gap: 1rem;
        }

        input[type="text"] {
            flex-grow: 1;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #475569;
            background-color: #0f172a;
            color: white;
            font-size: 1rem;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #3b82f6;
        }

        button {
            padding: 0 2rem;
            border-radius: 8px;
            background-color: #3b82f6;
            color: white;
            border: none;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        button:hover {
            background-color: #2563eb;
        }

        button:disabled {
            background-color: #64748b;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>
        <h2>LLM Faceoff - Personal Assistant</h2>
        <div>
            <label for="model-selector">Select Model: </label>
            <select id="model-selector">
                <option value="" disabled selected>Loading models...</option>
            </select>
        </div>
    </header>

    <div id="chat-container">
        <div class="message ai-message">Hello! I am your AI assistant. Select a model above and ask me anything!</div>
    </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type your message here..." autocomplete="off">
        <button id="send-btn">Send</button>
    </div>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const modelSelector = document.getElementById('model-selector');

        let chatHistory = [];

        async function fetchModels() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/models');
                const data = await response.json();
                
                modelSelector.innerHTML = ''; // clear loading state
                
                const groupMapping = {
                    "api_gemini": "Frontier Models (Gemini)",
                    "api_groq": "Frontier Models (Groq)",
                    "oss_serverless": "Open Source Models (Serverless)",
                    "oss_local": "Open Source Models (Local HF)"
                };

                for (const [key, models] of Object.entries(data)) {
                    if (models && models.length > 0) {
                        const optgroup = document.createElement('optgroup');
                        optgroup.label = groupMapping[key] || key;
                        
                        models.forEach(model => {
                            const option = document.createElement('option');
                            option.value = model;
                            option.textContent = model;
                            optgroup.appendChild(option);
                        });
                        
                        modelSelector.appendChild(optgroup);
                    }
                }
            } catch (err) {
                console.error("Could not fetch models:", err);
                modelSelector.innerHTML = '<option disabled>Error loading models</option>';
            }
        }

        function appendMessage(role, text) {
            const div = document.createElement('div');
            div.classList.add('message');
            div.classList.add(role === 'user' ? 'user-message' : 'ai-message');
            div.innerText = text;
            chatContainer.appendChild(div);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return div;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const selectedModel = modelSelector.value;
            const selectedOptgroupDetails = modelSelector.options[modelSelector.selectedIndex].parentNode.label;
            
            // Add to UI
            appendMessage('user', text);
            userInput.value = '';
            
            // Add to History
            chatHistory.push({ role: 'user', content: text });

            // Disable input while generating
            userInput.disabled = true;
            sendBtn.disabled = true;

            let loadingWaitMessage = '...';
            if (selectedOptgroupDetails.includes("Local HF")) {
                loadingWaitMessage = 'loading the model';
            } else if (selectedOptgroupDetails.includes("Serverless")) {
                loadingWaitMessage = 'starting the server';
            }

            const aiMessageDiv = appendMessage('assistant', loadingWaitMessage);

            try {
                const response = await fetch('http://127.0.0.1:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: selectedModel,
                        messages: chatHistory
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.statusText}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                
                let isFirstChunk = true;
                let fullAiText = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    if (isFirstChunk) {
                        aiMessageDiv.innerText = '';
                        isFirstChunk = false;
                    }
                    
                    const chunk = decoder.decode(value, { stream: true });
                    fullAiText += chunk;
                    aiMessageDiv.innerText = fullAiText;
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                }

                chatHistory.push({ role: 'assistant', content: fullAiText });

            } catch (error) {
                console.error("Chat error:", error);
                aiMessageDiv.innerText = "Error: Could not connect to the model.";
                // Remove the failed user prompt from history so they can try again smoothly
                chatHistory.pop(); 
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // Initialize
        fetchModels();
    </script>
</body>
</html>
